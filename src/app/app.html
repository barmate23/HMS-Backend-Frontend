<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside 
    class="bg-surface-900 text-white flex flex-col transition-all duration-300 ease-in-out"
    [class.w-64]="!isSidebarCollapsed()"
    [class.w-20]="isSidebarCollapsed()"
  >
    <!-- Logo -->
    <div class="h-16 flex items-center px-6 border-b border-white/10 shrink-0 overflow-hidden">
      <mat-icon class="text-brand-500 mr-3">hotel</mat-icon>
      <span class="font-bold text-lg tracking-tight whitespace-nowrap transition-opacity duration-300"
            [class.opacity-0]="isSidebarCollapsed()"
            [class.w-0]="isSidebarCollapsed()">
        LuxeStay HMS
      </span>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      @for (item of navItems; track item.path) {
        <a 
          [routerLink]="item.path"
          routerLinkActive="bg-brand-600 text-white"
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center px-3 py-2.5 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition-colors group relative"
          [title]="isSidebarCollapsed() ? item.label : ''"
        >
          <mat-icon class="shrink-0">{{item.icon}}</mat-icon>
          <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300"
                [class.opacity-0]="isSidebarCollapsed()"
                [class.w-0]="isSidebarCollapsed()"
                [class.invisible]="isSidebarCollapsed()">
            {{item.label}}
          </span>
          
          <!-- Tooltip for collapsed state -->
          @if (isSidebarCollapsed()) {
            <div class="absolute left-full ml-2 px-2 py-1 bg-surface-800 text-xs rounded opacity-0 group-hover:opacity-100 pointer-events-none z-50 whitespace-nowrap">
              {{item.label}}
            </div>
          }
        </a>
      }
    </nav>

    <!-- Footer / Collapse Toggle -->
    <div class="p-4 border-t border-white/10 shrink-0">
      <button 
        (click)="toggleSidebar()"
        class="w-full flex items-center justify-center p-2 rounded-lg hover:bg-white/5 transition-colors text-white/50 hover:text-white"
      >
        <mat-icon>{{isSidebarCollapsed() ? 'chevron_right' : 'chevron_left'}}</mat-icon>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 bg-surface-50 overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-surface-200 flex items-center justify-between px-8 shrink-0">
      <div class="flex items-center space-x-4">
        <h1 class="text-xl font-semibold text-surface-900">
          Management Console
        </h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <button class="p-2 text-surface-500 hover:text-brand-600 transition-colors relative">
          <mat-icon>notifications</mat-icon>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <div class="h-8 w-px bg-surface-200"></div>
        <div class="flex items-center space-x-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-medium text-surface-900">Admin User</p>
            <p class="text-xs text-surface-500">General Manager</p>
          </div>
          <div class="h-10 w-10 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center font-bold border border-brand-200">
            AD
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
